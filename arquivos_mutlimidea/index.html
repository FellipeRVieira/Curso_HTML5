<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteúdo Multimídia</title>
</head>
<body>
    <h1>Conteúdo Multimídia</h1>
    <hr>

<!-- Elemento para Exibição de Vídeo -->
    <video controls width="800" height="600" autoplay muted>
 <!-- source define múltiplos recursos de mídea -->       
        <source src="PopeyeforPresident.mp4" type="video/mp4">
        <source src="PopeyeforPresident.webm" type="video/webm">
        <source src="PopeyeforPresident.ogv" type="video/ogv">
<!-- Elemento que faz com que o vídeo exiba uma legenda -->
        <track kind="captions" srclang="en-us" src="PopeyeforPresident.en-us.vtt" label="Colsed captions"></track>
        <track kind="subtitles" srclang="pt-br" src="PopeyeforPresident.pt-br.vtt" label="Legendas PT-BR" default></track>
        <track kind="subtitles" srclang="es" src="PopeyeforPresident.es.vtt" label="Legendas em Espanhol"></track>
        Seu navegador não suporta vídeos HTML5.
    </video>
</body>
</html>
